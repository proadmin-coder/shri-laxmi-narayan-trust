<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:#111;
padding:40px;
border-radius:20px;
width:350px;

box-shadow:0 0 25px gold;
}

h2{
text-align:center;
color:gold;
}

input{

width:100%;
padding:12px;
margin:10px 0;

border:none;
border-radius:10px;
}

button{

width:100%;
padding:12px;

background:gold;
border:none;

font-weight:bold;
cursor:pointer;

border-radius:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🛠 Admin Login</h2>

<input
type="text"
id="user"
placeholder="Username">

<input
type="password"
id="pass"
placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>

function login(){

let user =
document.getElementById("user").value;

let pass =
document.getElementById("pass").value;

if(
user==="admin"
&&
pass==="12345"
){

window.location.href =
"dashboard.html";

}
else{

alert(
"Wrong Username or Password"
);

}

}

</script>

</body>
</html>
