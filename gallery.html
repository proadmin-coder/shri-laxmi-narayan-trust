<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>फोटो गैलरी</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:gold;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#111;
padding:10px;
border-radius:15px;
border:1px solid gold;
text-align:center;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

.download-btn{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:gold;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:25px;
}

</style>

</head>

<body>

<h1>📸 श्री लक्ष्मी नारायण सेवा ट्रस्ट गैलरी</h1>

<div class="gallery">

<div class="card">
<img src="gallery/photo1.jpeg" alt="">
<a href="gallery/photo1.jpeg" download class="download-btn">
Download Photo
</a>
</div>

<div class="card">
<img src="gallery/photo2.jpeg" alt="">
<a href="gallery/photo2.jpeg" download class="download-btn">
Download Photo
</a>
</div>

<div class="card">
<img src="gallery/photo3.jpeg" alt="">
<a href="gallery/photo3.jpeg" download class="download-btn">
Download Photo
</a>
</div>

<div class="card">
<img src="gallery/photo4.jpeg" alt="">
<a href="gallery/photo4.jpeg" download class="download-btn">
Download Photo
</a>
</div>

</div>

</body>
</html>
